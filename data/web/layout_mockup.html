<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TWStockTracker Web Mockup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chart-placeholder {
            background: linear-gradient(45deg, #1a1a1a 25%, #2a2a2a 25%, #2a2a2a 50%, #1a1a1a 50%, #1a1a1a 75%, #2a2a2a 75%, #2a2a2a 100%);
            background-size: 20px 20px;
        }
    </style>
</head>
<body class="bg-[#0f1115] text-white font-sans overflow-hidden h-screen flex flex-col md:flex-row">

    <!-- Sidebar (PC Only) -->
    <aside class="hidden md:flex w-20 lg:w-64 flex-col bg-[#161b22] border-r border-gray-800 transition-all">
        <div class="p-4 font-bold text-xl text-blue-400 border-b border-gray-800">TWStock</div>
        <nav class="flex-1 mt-4 space-y-2 px-2">
            <div class="p-3 bg-blue-600/20 text-blue-400 rounded-lg flex items-center space-x-3">
                <span class="w-6 text-center">📊</span><span class="hidden lg:inline">行情首頁</span>
            </div>
            <div class="p-3 hover:bg-gray-800 rounded-lg flex items-center space-x-3 text-gray-400">
                <span class="w-6 text-center">⭐</span><span class="hidden lg:inline">自選監控</span>
            </div>
            <div class="p-3 hover:bg-gray-800 rounded-lg flex items-center space-x-3 text-gray-400">
                <span class="w-6 text-center">📈</span><span class="hidden lg:inline">趨勢雷達</span>
            </div>
            <div class="p-3 hover:bg-gray-800 rounded-lg flex items-center space-x-3 text-gray-400">
                <span class="w-6 text-center">💼</span><span class="hidden lg:inline">我的持股</span>
            </div>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col overflow-y-auto pb-20 md:pb-0">
        <!-- Top Header -->
        <header class="h-16 border-b border-gray-800 flex items-center justify-between px-4 bg-[#0f1115]">
            <div class="flex items-center space-x-2">
                <span class="font-bold text-lg">2330 台積電</span>
                <span class="text-red-500 text-sm font-mono">1050 ▲ 15 (1.45%)</span>
            </div>
            <div class="flex space-x-2">
                <button class="bg-gray-800 px-3 py-1 rounded text-sm">1分</button>
                <button class="bg-blue-600 px-3 py-1 rounded text-sm font-bold">日線</button>
            </div>
        </header>

        <!-- Charts Grid -->
        <div class="flex-1 p-4 grid grid-cols-1 lg:grid-cols-4 gap-4 overflow-hidden">
            <!-- Main K-Line -->
            <div class="lg:col-span-3 bg-[#161b22] rounded-xl border border-gray-800 relative overflow-hidden flex flex-col">
                <div class="p-2 border-b border-gray-800 flex justify-between text-xs text-gray-500">
                    <span>ECharts K-Line Container (Indicators/Structural Overlay)</span>
                    <span>Volume: 24,105</span>
                </div>
                <div class="flex-1 chart-placeholder opacity-30"></div>
            </div>
            <!-- Side Panel (Quotes/Orders) -->
            <div class="bg-[#161b22] rounded-xl border border-gray-800 p-4 hidden lg:block">
                <h3 class="text-sm font-bold mb-4">五檔報價</h3>
                <div class="space-y-1 font-mono text-xs">
                    <div class="flex justify-between text-red-400"><span>1055.0</span><span>120</span></div>
                    <div class="flex justify-between text-red-400"><span>1052.5</span><span>85</span></div>
                    <div class="flex justify-between bg-white/5 py-1"><span>1050.0</span><span>現價</span></div>
                    <div class="flex justify-between text-green-400"><span>1047.5</span><span>210</span></div>
                    <div class="flex justify-between text-green-400"><span>1045.0</span><span>155</span></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Bottom Navigation (Mobile Only) -->
    <nav class="md:hidden fixed bottom-0 left-0 right-0 h-16 bg-[#161b22] border-t border-gray-800 flex justify-around items-center z-50">
        <div class="flex flex-col items-center text-blue-400">
            <span class="text-xl">📊</span><span class="text-[10px]">行情</span>
        </div>
        <div class="flex flex-col items-center text-gray-500">
            <span class="text-xl">⭐</span><span class="text-[10px]">自選</span>
        </div>
        <div class="flex flex-col items-center text-gray-500">
            <span class="text-xl">📈</span><span class="text-[10px]">趨勢</span>
        </div>
        <div class="flex flex-col items-center text-gray-500">
            <span class="text-xl">💼</span><span class="text-[10px]">資產</span>
        </div>
    </nav>
</body>
</html>
