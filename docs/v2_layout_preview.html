<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TWStockTracker Web V2 Mockup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains+Mono', monospace; }
        .nav-active { @apply bg-blue-600/10 text-blue-400 border-r-2 border-blue-500; }
        .sub-tab-active { @apply border-b-2 border-blue-500 text-blue-400 font-bold; }
    </style>
</head>
<body class="bg-[#0f1115] text-white h-screen overflow-hidden flex flex-col md:flex-row">

    <!-- Sidebar (PC) -->
    <aside class="hidden md:flex w-64 flex-col bg-[#161b22] border-r border-gray-800">
        <div class="p-6 flex justify-between items-center border-b border-gray-800">
            <h1 class="text-xl font-bold text-blue-400">TWStock Pro</h1>
            <button class="text-gray-500 hover:text-yellow-400">☀️</button>
        </div>
        <nav class="flex-1 mt-4 px-2 space-y-1">
            <a href="#" class="flex items-center p-3 text-gray-400 hover:bg-gray-800 rounded-lg transition-all">
                <span class="mr-3">💼</span> 我的持股
            </a>
            <a href="#" class="flex items-center p-3 bg-blue-600/10 text-blue-400 border-r-2 border-blue-500 rounded-lg">
                <span class="mr-3">📈</span> 趨勢獵人
            </a>
            <a href="#" class="flex items-center p-3 text-gray-400 hover:bg-gray-800 rounded-lg transition-all">
                <span class="mr-3">🛡️</span> 資產風險
            </a>
            <a href="#" class="flex items-center p-3 text-gray-400 hover:bg-gray-800 rounded-lg transition-all">
                <span class="mr-3">🏆</span> 歷年戰績
            </a>
            <a href="#" class="flex items-center p-3 text-gray-400 hover:bg-gray-800 rounded-lg transition-all">
                <span class="mr-3">➕</span> 新增交易
            </a>
        </nav>
        <div class="p-4 border-t border-gray-800 text-[10px] text-gray-600 text-center">
            V2.08.0 Build 20260519
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col min-w-0 bg-[#0f1115]">
        <!-- Top Indices & Header -->
        <header class="h-16 border-b border-gray-800 flex items-center justify-between px-6 bg-[#0f1115]/80 backdrop-blur-md">
            <h2 class="text-lg font-bold">趨勢獵人</h2>
            <div class="flex items-center space-x-6 text-xs">
                <div class="flex space-x-4">
                    <span>台指 <span class="text-red-500 font-mono">21,500 ▲</span></span>
                    <span>櫃買 <span class="text-green-500 font-mono">252.1 ▼</span></span>
                </div>
            </div>
        </header>

        <!-- Sub-Tabs (PC Dashboard View) -->
        <div class="bg-[#161b22] px-6 border-b border-gray-800 overflow-x-auto no-scrollbar">
            <div class="flex space-x-8">
                <button class="py-4 sub-tab-active text-sm whitespace-nowrap">量化精選</button>
                <button class="py-4 text-gray-500 hover:text-gray-300 text-sm whitespace-nowrap">ETF戰情</button>
                <button class="py-4 text-gray-500 hover:text-gray-300 text-sm whitespace-nowrap">精選策略</button>
                <button class="py-4 text-gray-500 hover:text-gray-300 text-sm whitespace-nowrap">今日最熱</button>
                <button class="py-4 text-gray-500 hover:text-gray-300 text-sm whitespace-nowrap">資金輪動</button>
                <button class="py-4 text-gray-500 hover:text-gray-300 text-sm whitespace-nowrap">熱力圖</button>
                <button class="py-4 text-gray-500 hover:text-gray-300 text-sm whitespace-nowrap">我的收藏</button>
            </div>
        </div>

        <!-- Content Body (Dashboard Mode on PC) -->
        <div class="flex-1 p-6 overflow-y-auto">
            <div class="grid grid-cols-1 xl:grid-cols-3 gap-6">
                <!-- Main Strategy Table -->
                <div class="xl:col-span-2 space-y-6">
                    <div class="bg-[#161b22] border border-gray-800 rounded-xl overflow-hidden">
                        <div class="p-4 border-b border-gray-800 flex justify-between items-center">
                            <h3 class="font-bold">量化精選標的</h3>
                            <button class="text-xs text-blue-400">查看全部</button>
                        </div>
                        <div class="p-8 text-center text-gray-600 border-2 border-dashed border-gray-800 m-4 rounded-lg">
                            此區域在 PC 會展示寬版表格，顯示多項量化指標
                        </div>
                    </div>
                </div>

                <!-- Side Info (Asset/Risk Snapshot) -->
                <div class="space-y-6">
                    <div class="bg-gradient-to-br from-blue-900/20 to-[#161b22] border border-blue-900/30 rounded-xl p-5">
                        <h4 class="text-sm font-bold text-blue-400 mb-4">市場環境感測</h4>
                        <div class="text-2xl font-bold mb-2">獵人模式 (Aggressive)</div>
                        <p class="text-xs text-gray-400 leading-relaxed">當前 50+ 產業主題中，機器人、SpaceX 鏈展現強勁動能，建議曝險 65%。</p>
                    </div>
                    <div class="bg-[#161b22] border border-gray-800 rounded-xl p-5">
                        <h4 class="text-sm font-bold text-gray-400 mb-4">資金輪動概況</h4>
                        <div class="h-40 flex items-center justify-center border border-gray-800 rounded">
                            <span class="text-xs text-gray-600 text-center px-4">在 PC 上此處會顯示小型趨勢圖，不需切換分頁</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Mobile Navigation (Bottom) -->
    <nav class="md:hidden h-16 bg-[#161b22] border-t border-gray-800 flex justify-around items-center">
        <div class="flex flex-col items-center text-gray-500">
            <span class="text-xl">💼</span><span class="text-[10px]">持股</span>
        </div>
        <div class="flex flex-col items-center text-blue-400">
            <span class="text-xl">📈</span><span class="text-[10px]">趨勢</span>
        </div>
        <div class="flex flex-col items-center text-gray-500">
            <span class="text-xl">🛡️</span><span class="text-[10px]">風險</span>
        </div>
        <div class="flex flex-col items-center text-gray-500">
            <span class="text-xl">🏆</span><span class="text-[10px]">戰績</span>
        </div>
    </nav>
</body>
</html>
